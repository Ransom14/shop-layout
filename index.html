<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontier Foundry Shop Layout</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --scale: 20px; /* 1 foot = 20 pixels */
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #1e1e1e;
            color: #fff;
            overflow: hidden;
        }
        #sidebar {
            width: 280px;
            background-color: #2d2d2d;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }
        #sidebar h2 { margin: 0; font-size: 1.2rem; border-bottom: 1px solid #444; padding-bottom: 5px; }
        #sidebar h3 { margin: 10px 0 0 0; font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px;}
        
        .input-group { display: flex; gap: 5px; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 5px; background: #1e1e1e; border: 1px solid #555; color: white; font-size: 0.9rem;}
        
        button {
            width: 100%;
            padding: 8px;
            background-color: #4a90e2;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
        button:hover { background-color: #357abd; }
        .btn-secondary { background-color: #555; margin-top: 5px;}
        .btn-secondary:hover { background-color: #666; }
        .btn-success { background-color: #27ae60; margin-top: 15px;}
        .btn-success:hover { background-color: #219653; }

        .item-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .draggable-item {
            color: white;
            padding: 6px;
            text-align: center;
            cursor: grab;
            user-select: none;
            border-radius: 4px;
            font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        #edit-panel {
            background-color: #3d3d3d;
            padding: 10px;
            border-radius: 4px;
            display: none; /* Hidden by default */
            border: 1px solid #2ecc71;
        }

        #canvas-area {
            flex-grow: 1;
            position: relative;
            background-color: #1a1a1a;
            overflow: auto;
            padding: 20px;
        }

        #shop-floor {
            position: relative;
            background-color: #252526;
            background-image: 
                linear-gradient(#333 1px, transparent 1px),
                linear-gradient(90deg, #333 1px, transparent 1px);
            background-size: var(--scale) var(--scale);
            border: 4px solid #4a90e2;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transform-origin: top left;
        }

        #loft-overlay {
            position: absolute;
            background-color: rgba(243, 156, 18, 0.15);
            border: 2px dashed #f39c12;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(243, 156, 18, 0.6);
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 2px;
            z-index: 50;
        }

        .placed-item {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: grab;
            user-select: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.4);
            box-sizing: border-box;
            z-index: 40;
            line-height: 1.1;
        }
        .placed-item.selected { border-color: #2ecc71; border-width: 2px; z-index: 100; box-shadow: 0 0 10px #2ecc71; }
        
        .style-stairs { background: repeating-linear-gradient(45deg, #555, #555 5px, #444 5px, #444 10px); }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Frontier Foundry Setup</h2>
        
        <h3>Shop Boundary (ft)</h3>
        <div class="input-group">
            <input type="number" id="shop-w" value="40" title="Width (X)">
            <input type="number" id="shop-h" value="30" title="Length (Y)">
        </div>
        
        <h3>Loft Overlay (ft)</h3>
        <div class="input-group">
            <input type="number" id="loft-w" value="15" title="Width">
            <input type="number" id="loft-h" value="10" title="Length">
        </div>
        <div class="input-group">
            <input type="number" id="loft-x" value="0" title="X Position">
            <input type="number" id="loft-y" value="0" title="Y Position">
        </div>
        <button onclick="updateShop()">Apply Dimensions</button>

        <div id="edit-panel">
            <h3 style="margin-top:0; color: #2ecc71;">Edit Selected Item</h3>
            <div class="input-group">
                <input type="number" id="edit-w" title="Custom Width (ft)" step="0.5">
                <input type="number" id="edit-h" title="Custom Length (ft)" step="0.5">
            </div>
            <button onclick="applyCustomSize()" style="background-color: #2ecc71; padding: 5px;">Update Size</button>
            <button class="btn-secondary" id="rotate-btn" style="padding: 5px;">Rotate 90°</button>
            <button class="btn-secondary" id="delete-btn" style="background-color: #c0392b; padding: 5px;">Delete</button>
        </div>

        <h3>Structure & Utilities</h3>
        <div class="item-grid">
            <div class="draggable-item style-stairs" data-w="3" data-h="10" data-bg="#555">Staircase</div>
            <div class="draggable-item" data-w="6" data-h="8" data-bg="#2980b9">Bathroom</div>
            <div class="draggable-item" data-w="3" data-h="5" data-bg="#8e44ad">Closet</div>
            <div class="draggable-item" data-w="2" data-h="1" data-bg="#e74c3c">Elec Panel</div>
            <div class="draggable-item" data-w="3" data-h="1" data-bg="#f1c40f">Man Door</div>
            <div class="draggable-item" data-w="10" data-h="1" data-bg="#e67e22">Garage Door</div>
        </div>

        <h3>Equipment</h3>
        <div class="item-grid">
            <div class="draggable-item" data-w="3" data-h="3" data-bg="#d35400">Artisan</div>
            <div class="draggable-item" data-w="2" data-h="2" data-bg="#16a085">FLSUN S1</div>
            <div class="draggable-item" data-w="3" data-h="2" data-bg="#27ae60">Makera Z1</div>
            <div class="draggable-item" data-w="8" data-h="3" data-bg="#34495e">Workbench</div>
            <div class="draggable-item" data-w="4" data-h="2" data-bg="#7f8c8d">Rack</div>
        </div>

        <button class="btn-success" onclick="exportLayout()">Export Layout (PNG)</button>
    </div>

    <div id="canvas-area">
        <div id="shop-floor">
            <div id="loft-overlay">LOFT</div>
        </div>
    </div>

    <script>
        const SCALE = 20; // 1 foot = 20px
        const shopFloor = document.getElementById('shop-floor');
        const loftOverlay = document.getElementById('loft-overlay');
        const editPanel = document.getElementById('edit-panel');
        
        let selectedElement = null;
        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        function updateShop() {
            const sw = document.getElementById('shop-w').value;
            const sh = document.getElementById('shop-h').value;
            shopFloor.style.width = (sw * SCALE) + 'px';
            shopFloor.style.height = (sh * SCALE) + 'px';

            const lw = document.getElementById('loft-w').value;
            const lh = document.getElementById('loft-h').value;
            const lx = document.getElementById('loft-x').value;
            const ly = document.getElementById('loft-y').value;
            
            loftOverlay.style.width = (lw * SCALE) + 'px';
            loftOverlay.style.height = (lh * SCALE) + 'px';
            loftOverlay.style.left = (lx * SCALE) + 'px';
            loftOverlay.style.top = (ly * SCALE) + 'px';
        }

        updateShop();

        document.querySelectorAll('.draggable-item').forEach(item => {
            item.style.backgroundColor = item.getAttribute('data-bg'); 
            
            item.addEventListener('mousedown', (e) => {
                const widthFt = parseFloat(item.getAttribute('data-w'));
                const heightFt = parseFloat(item.getAttribute('data-h'));
                const bgColor = item.getAttribute('data-bg');
                const isStairs = item.classList.contains('style-stairs');
                
                const newBlock = document.createElement('div');
                newBlock.className = 'placed-item';
                if (isStairs) newBlock.classList.add('style-stairs');
                
                newBlock.innerHTML = item.innerText;
                newBlock.style.width = (widthFt * SCALE) + 'px';
                newBlock.style.height = (heightFt * SCALE) + 'px';
                if (!isStairs) newBlock.style.backgroundColor = bgColor;
                
                newBlock.style.left = (10 * SCALE) + 'px'; 
                newBlock.style.top = (10 * SCALE) + 'px';

                shopFloor.appendChild(newBlock);
                selectElement(newBlock);
                initDrag(newBlock, e);
            });
        });

        shopFloor.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('placed-item')) {
                selectElement(e.target);
                initDrag(e.target, e);
            } else if (e.target === shopFloor || e.target === loftOverlay) {
                deselectAll();
            }
        });

        function initDrag(element, e) {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            initialLeft = parseInt(element.style.left) || 0;
            initialTop = parseInt(element.style.top) || 0;
            element.style.cursor = 'grabbing';
        }

        document.addEventListener('mousemove', (e) => {
            if (!isDragging || !selectedElement) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            
            const snap = SCALE / 2;
            const newLeft = Math.round((initialLeft + dx) / snap) * snap;
            const newTop = Math.round((initialTop + dy) / snap) * snap;

            selectedElement.style.left = `${newLeft}px`;
            selectedElement.style.top = `${newTop}px`;
        });

        document.addEventListener('mouseup', () => {
            if (isDragging && selectedElement) selectedElement.style.cursor = 'grab';
            isDragging = false;
        });

        // --- NEW: Edit Panel Logic ---
        function selectElement(element) {
            deselectAll();
            selectedElement = element;
            selectedElement.classList.add('selected');
            
            // Show edit panel and populate current sizes in feet
            editPanel.style.display = 'block';
            document.getElementById('edit-w').value = parseFloat(element.style.width) / SCALE;
            document.getElementById('edit-h').value = parseFloat(element.style.height) / SCALE;
        }

        function deselectAll() {
            document.querySelectorAll('.placed-item').forEach(el => el.classList.remove('selected'));
            selectedElement = null;
            editPanel.style.display = 'none';
        }

        function applyCustomSize() {
            if (selectedElement) {
                const newW = document.getElementById('edit-w').value;
                const newH = document.getElementById('edit-h').value;
                selectedElement.style.width = (newW * SCALE) + 'px';
                selectedElement.style.height = (newH * SCALE) + 'px';
            }
        }

        document.getElementById('rotate-btn').addEventListener('click', () => {
            if (selectedElement) {
                const currentWidth = parseFloat(selectedElement.style.width) / SCALE;
                const currentHeight = parseFloat(selectedElement.style.height) / SCALE;
                
                // Swap dimensions visually
                selectedElement.style.width = (currentHeight * SCALE) + 'px';
                selectedElement.style.height = (currentWidth * SCALE) + 'px';
                
                // Update inputs
                document.getElementById('edit-w').value = currentHeight;
                document.getElementById('edit-h').value = currentWidth;
            }
        });

        document.getElementById('delete-btn').addEventListener('click', () => {
            if (selectedElement) {
                selectedElement.remove();
                deselectAll();
            }
        });

        // --- NEW: Export Logic ---
        function exportLayout() {
            // Temporarily hide selection box for a clean screenshot
            const tempSelected = selectedElement;
            if (tempSelected) tempSelected.classList.remove('selected');

            html2canvas(document.getElementById('shop-floor'), {
                backgroundColor: '#1a1a1a' 
            }).then(canvas => {
                // Create an invisible link to trigger the download
                const link = document.createElement('a');
                link.download = 'frontier-foundry-layout.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                // Restore selection box
                if (tempSelected) tempSelected.classList.add('selected');
            });
        }
    </script>
</body>
</html>
